trigger:
  branches:
    include:
    - main
  paths:
    exclude:
    - README.md
pr:
  branches:
    include:
    - main
  drafts: false
  paths:
    exclude:
    - README.md

pool:
  vmImage: ubuntu-latest

parameters:
  - name: forceDeployToEnvironment
    displayName: Set to either dev, test, preprod to force a deploy to that environment from the chosen branch.
    type: string
    values:
    - none
    - dev
    - test
    - preprod
    default: 'none'

variables:
  - group: Common
  - name: artifactName
    value: 'drop'
  # TODO Read the function app resource name as an output variable from the 'EES - Search - Infrastructure and Deploy' pipeline?
  - name: azureFunctionAppNameDev
    value: 's101d01-ees-fa-nlsearch'
  - name: azureFunctionAppNameTest
    value: 's101t01-ees-fa-nlsearch'
  - name: azureFunctionAppNamePreProd
    value: 's101p02-ees-fa-nlsearch'
  - name: azureFunctionAppNameProd
    value: 's101p01-ees-fa-nlsearch'
  - name: isReleaseBuild
    value: $[and(eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))]
  - name: isForceDeployment
    value: ${{ ne(parameters.forceDeployToEnvironment, 'none') }}
  - name: shouldPublishArtifact
    value: $[or(eq(variables.isReleaseBuild, true), eq(variables.isForceDeployment, true))]

stages:
  - template: pipelines/templates/stages/ci.yml
    parameters:
      artifactName: $(artifactName)

  - template: pipelines/templates/stages/deploy.yml
    parameters:
      artifactName: $(artifactName)
      condition: |
        and(
          succeeded(),
          or(
            eq(variables.isReleaseBuild, true),
            eq('${{ parameters.forceDeployToEnvironment }}', 'dev')
          )
        )
      dependsOn:
        - 'CI'
      environmentName: Dev
      functionAppName: $(azureFunctionAppNameDev)
      serviceConnection: $(serviceConnectionDev)
      stageName: 'Deploy_Dev'

  - template: pipelines/templates/stages/deploy.yml
    parameters:
      artifactName: $(artifactName)
      condition: |
        and(
          succeeded(),
          or(
            eq(variables.isReleaseBuild, true),
            eq('${{ parameters.forceDeployToEnvironment }}', 'test')
          )
        )
      dependsOn:
        - 'CI'
      environmentName: Test
      functionAppName: $(azureFunctionAppNameTest)
      serviceConnection: $(serviceConnectionTest)
      stageName: 'Deploy_Test'

  - template: pipelines/templates/stages/deploy.yml
    parameters:
      artifactName: $(artifactName)
      condition: |
        and(
          succeeded(),
          or(
            eq(variables.isReleaseBuild, true),
            eq('${{ parameters.forceDeployToEnvironment }}', 'preprod')
          )
        )
      dependsOn:
        - 'CI'
      environmentName: Pre-Prod
      functionAppName: $(azureFunctionAppNamePreProd)
      serviceConnection: $(serviceConnectionPreProd)
      stageName: 'Deploy_PreProd'

  - template: pipelines/templates/stages/deploy.yml
    parameters:
      artifactName: $(artifactName)
      condition: |
        and(
          succeeded(),
          eq(dependencies.Deploy_PreProd.result, 'Succeeded')
        )
      dependsOn:
        - 'Deploy_PreProd'
      environmentName: Prod
      functionAppName: $(azureFunctionAppNameProd)
      serviceConnection: $(serviceConnectionProd)
      stageName: 'Deploy_Prod'
