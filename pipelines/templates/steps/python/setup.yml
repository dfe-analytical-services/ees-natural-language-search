parameters:
  pythonVersion: '3.14'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '${{ parameters.pythonVersion }}'
    displayName: 'Use Python ${{ parameters.pythonVersion }}'

  - script: |
      python -m pip install --upgrade pip
      python -m pip install uv
    displayName: 'Upgrade pip and install uv'

  - script: |
      uv export --frozen --no-dev --no-hashes --no-emit-project -o 
      "$(Agent.TempDirectory)/requirements.txt"
      pip install --target="./.python_packages/lib/site-packages" -r 
      "$(Agent.TempDirectory)/requirements.txt"
      displayName: 'Vendor dependencies (uv export -> .python_packages)'
